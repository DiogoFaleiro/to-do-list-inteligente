<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List Inteligente</title>

  <!-- Open Graph / prévia ao compartilhar o link (WhatsApp, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://diogofaleiro.github.io/to-do-list-inteligente/">
  <meta property="og:title" content="To-Do List Inteligente">
  <meta property="og:description" content="Seu dia a dia mais organizado">
  <meta property="og:image" content="https://diogofaleiro.github.io/to-do-list-inteligente/icons/social-preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="pt_BR">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="To-Do List Inteligente">
  <meta name="twitter:description" content="Seu dia a dia mais organizado">
  <meta name="twitter:image" content="https://diogofaleiro.github.io/to-do-list-inteligente/icons/social-preview.png">
  <meta name="description" content="Seu dia a dia mais organizado">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#6c5ce7">
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('todolist.ui.v1');
        var parsed = raw ? JSON.parse(raw) : null;
        var pref = parsed && parsed.theme;
        if (!pref || pref === 'system') {
          pref = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', pref);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="authLoadingScreen" class="auth-loading">
    <div class="auth-loading-spinner" aria-hidden="true"></div>
    <p>Carregando...</p>
  </div>

  <div id="authScreen" class="auth-screen" hidden>
    <div class="auth-card">
      <div class="auth-panel auth-panel-form">
        <img src="icons/icon-192.png" alt="To-Do List Inteligente" class="auth-logo">
        <h2 id="authFormTitle" class="auth-title">Bem-vindo(a) de volta!</h2>
        <p class="auth-subtitle">Seu dia a dia mais organizado.</p>

        <form id="authForm" class="auth-form">
          <p id="authFormError" class="auth-error" hidden></p>

          <label>E-mail
            <input type="email" id="authEmail" required autocomplete="email" placeholder="voce@email.com">
          </label>

          <label>Senha
            <input type="password" id="authPassword" required minlength="6" autocomplete="current-password" placeholder="Mínimo 6 caracteres">
          </label>

          <button type="submit" id="authSubmitBtn" class="btn-primary btn-block">Entrar</button>
        </form>

        <p class="auth-switch">
          <span id="authSwitchText">Não tem uma conta?</span>
          <button type="button" id="authSwitchBtn" class="btn-link">Criar conta</button>
        </p>
      </div>

      <div class="auth-panel auth-panel-visual" aria-hidden="true">
        <div class="auth-blob auth-blob-1"></div>
        <div class="auth-blob auth-blob-2"></div>
        <img src="icons/icon-512.png" alt="" class="auth-visual-logo">
        <p class="auth-visual-caption">
          <strong>Organize sua rotina</strong>
          <span>Tarefas, projetos e prazos, tudo em um só lugar.</span>
        </p>
      </div>
    </div>
  </div>

  <div class="app" hidden>
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>📝 Minhas Tarefas</h1>
        <button id="themeToggleBtn" class="theme-toggle" type="button" aria-label="Alternar tema escuro" aria-pressed="false" title="Alternar tema">
          <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
        </button>
        <button id="sidebarCloseBtn" class="sidebar-close" type="button" aria-label="Fechar">✕</button>
      </div>
      <button id="newProjectBtn" class="btn-secondary btn-block">+ Novo projeto</button>
      <nav id="projectList" class="project-list"></nav>

      <div class="sidebar-footer">
        <a id="adminPanelBtn" class="btn-secondary btn-block" href="admin/index.html" hidden>📊 Painel Admin</a>
        <div class="user-indicator">
          <span id="userEmailLabel" class="user-email" title=""></span>
          <button id="logoutBtn" class="btn-link">Sair</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <!-- Cabeçalho compacto, só visível no mobile (≤600px) -->
      <header class="mobile-title-bar">
        <div class="mobile-title-text">
          <h2 id="mobileViewTitle">Hoje</h2>
          <span id="mobileTaskCount" class="mobile-task-count"></span>
        </div>
        <div class="mobile-title-actions">
          <button id="mobileKanbanToggleBtn" class="mobile-icon-btn" type="button" aria-label="Alternar para Kanban" title="Alternar Lista/Kanban">▤</button>
          <div class="period-menu-wrap">
            <button id="periodMenuBtn" class="mobile-icon-btn" type="button" aria-label="Mais filtros" title="Mais filtros">⋮</button>
            <div id="periodMenu" class="period-menu" hidden>
              <button type="button" data-period="month">Mês</button>
              <button type="button" data-period="all">Todas</button>
            </div>
          </div>
        </div>
      </header>

      <header class="toolbar">
        <div class="period-tabs" id="periodTabs">
          <button data-period="today" class="active">Hoje</button>
          <button data-period="week">Semana</button>
          <button data-period="month">Mês</button>
          <button data-period="all">Todas</button>
        </div>
        <div class="toolbar-right">
          <div class="view-toggle" id="viewToggle">
            <button data-view="list" class="active">☰ Lista</button>
            <button data-view="kanban">▤ Kanban</button>
          </div>
          <button id="newTaskBtn" class="btn-primary">+ Nova tarefa</button>
        </div>
      </header>

      <section id="listView" class="list-view"></section>

      <section id="kanbanView" class="kanban-view" hidden>
        <div class="kanban-column">
          <h2>A Fazer <span class="count" data-count="todo">0</span></h2>
          <div class="kanban-cards" data-column="todo"></div>
        </div>
        <div class="kanban-column">
          <h2>Fazendo <span class="count" data-count="doing">0</span></h2>
          <div class="kanban-cards" data-column="doing"></div>
        </div>
        <div class="kanban-column">
          <h2>Concluído <span class="count" data-count="done">0</span></h2>
          <div class="kanban-cards" data-column="done"></div>
        </div>
      </section>

      <p id="searchPlaceholder" class="empty-state" hidden>🔍 Busca em breve!</p>
    </main>

    <!-- Rodapé de navegação, só visível no mobile (≤600px) -->
    <nav class="mobile-bottom-nav">
      <button type="button" class="mobile-nav-btn" data-mobile-tab="today">
        <span aria-hidden="true">✅</span>
        <span>Hoje</span>
      </button>
      <button type="button" class="mobile-nav-btn" data-mobile-tab="upcoming">
        <span aria-hidden="true">📆</span>
        <span>Em breve</span>
      </button>
      <button type="button" class="mobile-nav-btn" data-mobile-tab="search">
        <span aria-hidden="true">🔍</span>
        <span>Buscar</span>
      </button>
      <button type="button" class="mobile-nav-btn" data-mobile-tab="browse">
        <span aria-hidden="true">🗂️</span>
        <span>Navegar</span>
      </button>
    </nav>
  </div>

  <!-- Modal de tarefa -->
  <div id="taskModal" class="modal-overlay" hidden>
    <form id="taskForm" class="modal">
      <h2 id="taskModalTitle">Nova tarefa</h2>
      <input type="hidden" id="taskId">

      <label>Título
        <input type="text" id="taskTitle" required maxlength="120" placeholder="O que precisa ser feito?">
      </label>

      <label>Projeto
        <select id="taskProject"></select>
      </label>

      <label class="checkbox-row">
        <input type="checkbox" id="taskRecurring">
        🔁 Repetir diariamente
      </label>

      <label id="taskDueDateRow">Data de vencimento
        <input type="date" id="taskDueDate">
      </label>

      <div class="modal-actions">
        <button type="button" id="taskCancelBtn" class="btn-secondary">Cancelar</button>
        <button type="submit" class="btn-primary">Salvar</button>
      </div>
    </form>
  </div>

  <!-- Modal de projeto -->
  <div id="projectModal" class="modal-overlay" hidden>
    <form id="projectForm" class="modal">
      <h2 id="projectModalTitle">Novo projeto</h2>
      <input type="hidden" id="projectId">

      <label>Nome
        <input type="text" id="projectName" required maxlength="40" placeholder="Ex: Trabalho">
      </label>

      <label>Cor
        <input type="color" id="projectColor" value="#6c5ce7">
      </label>

      <div class="modal-actions">
        <button type="button" id="projectDeleteBtn" class="btn-danger" hidden>Excluir projeto</button>
        <button type="button" id="projectCancelBtn" class="btn-secondary">Cancelar</button>
        <button type="submit" class="btn-primary">Salvar</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/utils.js"></script>
  <script src="js/localPrefs.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/api.js"></script>
  <script src="js/migrate.js"></script>
  <script src="js/store.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('sw.js')
          .then((reg) => {
            // O navegador só verifica automaticamente por uma versão nova do
            // service worker a cada ~24h. Forçamos essa checagem em toda
            // carga de página para não ficar preso numa versão antiga.
            reg.update();
          })
          .catch((err) => console.error('Falha ao registrar service worker', err));
      });
    }
  </script>
</body>
</html>
